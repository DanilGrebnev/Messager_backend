<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messager</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; overflow: hidden; }

        /* Auth */
        .auth-page { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-card { background: #16213e; padding: 32px; border-radius: 16px; width: 380px; }
        .auth-card h1 { text-align: center; margin-bottom: 20px; color: #e94560; }
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .tabs button { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; background: #1a1a2e; color: #888; }
        .tabs button.active { background: #e94560; color: #fff; }
        .auth-form { display: flex; flex-direction: column; gap: 8px; }
        .status { text-align: center; padding: 8px; border-radius: 8px; margin-top: 12px; font-size: 13px; }
        .status.ok { background: #0f3d0f; color: #4caf50; }
        .status.err { background: #3d0f0f; color: #f44336; }

        /* Common inputs */
        input, select, button { padding: 10px 14px; border-radius: 8px; border: 1px solid #333; font-size: 14px; }
        input { background: #1a1a2e; color: #eee; width: 100%; }
        input:focus { outline: none; border-color: #e94560; }
        select { background: #1a1a2e; color: #eee; border: 1px solid #333; cursor: pointer; }
        select:focus { outline: none; border-color: #e94560; }
        button { background: #e94560; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #c73650; }

        /* Main layout */
        .app-layout { display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 300px; background: #16213e; display: flex; flex-direction: column; border-right: 1px solid #0f3460; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #0f3460; }
        .sidebar-header h2 { color: #e94560; margin-bottom: 0; font-size: 18px; }
        .search-bar { display: flex; gap: 6px; }
        .search-bar input { flex: 1; margin: 0; padding: 8px 12px; font-size: 13px; }
        .search-bar select { padding: 8px; font-size: 13px; border-radius: 8px; min-width: 100px; }
        .search-results { max-height: 200px; overflow-y: auto; border-bottom: 1px solid #0f3460; }
        .search-results .user-item { padding: 10px 16px; cursor: pointer; font-size: 13px; color: #aaa; border-bottom: 1px solid #0f346033; }
        .search-results .user-item:hover { background: #0f3460; color: #fff; }
        .search-results .user-item .sub { font-size: 11px; opacity: 0.5; }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #0f346033; display: flex; align-items: center; gap: 10px; }
        .chat-item:hover { background: #0f3460; }
        .chat-item.active { background: #0f3460; border-left: 3px solid #e94560; }
        .chat-avatar { width: 36px; height: 36px; border-radius: 50%; background: #e94560; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; flex-shrink: 0; }
        .chat-info { overflow: hidden; flex: 1; }
        .chat-name { font-size: 14px; font-weight: 500; }
        .chat-sub { font-size: 11px; opacity: 0.5; }

        /* Unread badge */
        .unread-badge { background: #e94560; color: #fff; border-radius: 50%; min-width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; flex-shrink: 0; padding: 0 5px; }

        /* Chat */
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 16px 20px; background: #16213e; border-bottom: 1px solid #0f3460; font-size: 16px; font-weight: 600; }
        .chat-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #555; font-size: 16px; }
        .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 6px; }
        .msg { padding: 10px 14px; border-radius: 14px; max-width: 65%; font-size: 14px; line-height: 1.4; }
        .msg.sent { background: #e94560; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: #0f3460; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.system { background: transparent; align-self: center; color: #888; font-size: 12px; font-style: italic; padding: 4px 10px; }
        .msg .time { font-size: 11px; opacity: 0.5; margin-top: 4px; display: flex; align-items: center; gap: 4px; justify-content: flex-end; }
        .msg .sender-name { font-size: 11px; opacity: 0.7; margin-bottom: 2px; color: #e94560; }
        .send-form { padding: 12px 20px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 8px; }
        .send-form input { flex: 1; margin: 0; }
        .send-form button { padding: 10px 20px; }

        /* Read checkmarks */
        .read-status { font-size: 13px; opacity: 0.6; }
        .read-status.read { opacity: 1; color: #4caf50; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-card { background: #16213e; border-radius: 16px; padding: 24px; width: 360px; max-height: 80vh; display: flex; flex-direction: column; gap: 12px; }
        .modal-card h3 { color: #e94560; margin: 0; }
        .modal-users { flex: 1; overflow-y: auto; max-height: 300px; display: flex; flex-direction: column; gap: 4px; }
        .modal-user { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .modal-user:hover { background: #0f3460; }
        .modal-user.selected { background: #0f3460; }
        .modal-user input[type="checkbox"] { accent-color: #e94560; width: 16px; height: 16px; cursor: pointer; }
        .modal-actions { display: flex; gap: 8px; }
        .modal-actions button { flex: 1; }
        .btn-secondary { background: #333; color: #aaa; }
        .btn-secondary:hover { background: #444; }

        /* Sidebar header row */
        .sidebar-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .sidebar-header-row h2 { margin: 0; }
        .btn-small { padding: 6px 10px; font-size: 12px; border-radius: 6px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const API = "http://localhost:8000";

        function App() {
            // === Состояние аутентификации ===
            const [token, setToken] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [loading, setLoading] = useState(true);

            // === Состояние формы входа/регистрации ===
            const [tab, setTab] = useState("login");
            const [username, setUsername] = useState("");
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [status, setStatus] = useState(null);

            // === Состояние чатов и сообщений ===
            const [chats, setChats] = useState([]);
            const [activeChat, setActiveChat] = useState(null);
            const [messages, setMessages] = useState([]);
            const [text, setText] = useState("");

            // === Счётчики непрочитанных сообщений: { chatId: count } ===
            const [unreadCounts, setUnreadCounts] = useState({});

            // === Состояние поиска пользователей ===
            const [searchQuery, setSearchQuery] = useState("");
            const [searchBy, setSearchBy] = useState("username");
            const [searchResults, setSearchResults] = useState([]);

            // === Состояние модального окна создания группового чата ===
            const [showGroupModal, setShowGroupModal] = useState(false);
            const [groupName, setGroupName] = useState("");
            const [selectedUserIds, setSelectedUserIds] = useState([]);

            // === Рефы для доступа к актуальным значениям из замыканий (WebSocket колбэки) ===
            const messagesEnd = useRef(null);
            const wsRef = useRef(null);
            const activeChatRef = useRef(null);
            const tokenRef = useRef(null);
            const chatsRef = useRef([]);

            // Синхронизация рефов с состоянием — нужно для доступа к актуальным
            // значениям внутри WebSocket onmessage (который замыкает старое состояние)
            useEffect(() => { activeChatRef.current = activeChat; }, [activeChat]);
            useEffect(() => { tokenRef.current = token; }, [token]);
            useEffect(() => { chatsRef.current = chats; }, [chats]);

            // Автопрокрутка к последнему сообщению при обновлении списка
            useEffect(() => {
                messagesEnd.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            /**
             * Формирует заголовки для авторизованных HTTP-запросов.
             * Принимает опциональный токен (нужен при логине, когда state ещё не обновился).
             */
            const authHeaders = (t) => ({
                "Content-Type": "application/json",
                "Authorization": `Bearer ${t || token}`,
            });

            /**
             * Определяет отображаемое имя чата:
             * — для приватных чатов: username собеседника
             * — для групповых: поле name чата
             */
            const getChatDisplayName = (chat) => {
                if (chat.name) return chat.name;
                const other = chat.participants?.find((p) => p.user?.id !== currentUser?.id);
                return other?.user?.username || "Чат";
            };

            /** Первая буква имени чата для аватарки в сайдбаре. */
            const getChatAvatar = (chat) => {
                const name = getChatDisplayName(chat);
                return name[0]?.toUpperCase() || "?";
            };

            // ==============================================
            // Автологин при загрузке страницы через refresh-токен из localStorage
            // ==============================================

            useEffect(() => {
                const savedRefresh = localStorage.getItem("refresh_token");
                if (!savedRefresh) {
                    setLoading(false);
                    return;
                }
                (async () => {
                    try {
                        // Обновляем пару токенов через сохранённый refresh
                        const res = await fetch(`${API}/auth/refresh`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ refresh_token: savedRefresh }),
                        });
                        if (res.ok) {
                            const data = await res.json();
                            localStorage.setItem("access_token", data.access_token);
                            localStorage.setItem("refresh_token", data.refresh_token);
                            setToken(data.access_token);

                            // Извлекаем user_id из payload токена и загружаем данные пользователя
                            const payload = JSON.parse(atob(data.access_token.split(".")[1]));
                            const userRes = await fetch(`${API}/users/${payload.sub}`, {
                                headers: { "Authorization": `Bearer ${data.access_token}` },
                            });
                            if (userRes.ok) {
                                const userData = await userRes.json();
                                setCurrentUser(userData);

                                // Загружаем список чатов и инициализируем счётчики непрочитанных
                                const chatsRes = await fetch(`${API}/chats`, {
                                    headers: { "Authorization": `Bearer ${data.access_token}` },
                                });
                                if (chatsRes.ok) {
                                    const chatsData = await chatsRes.json();
                                    setChats(chatsData);
                                    const counts = {};
                                    chatsData.forEach((c) => { counts[c.id] = c.unread_count || 0; });
                                    setUnreadCounts(counts);
                                }
                            } else {
                                localStorage.removeItem("access_token");
                                localStorage.removeItem("refresh_token");
                            }
                        } else {
                            localStorage.removeItem("access_token");
                            localStorage.removeItem("refresh_token");
                        }
                    } catch {}
                    setLoading(false);
                })();
            }, []);

            /**
             * Выход: очищает токены из localStorage, сбрасывает всё состояние
             * и закрывает WebSocket-соединение.
             */
            const logout = () => {
                localStorage.removeItem("access_token");
                localStorage.removeItem("refresh_token");
                setToken(null);
                setCurrentUser(null);
                setChats([]);
                setActiveChat(null);
                setMessages([]);
                setUnreadCounts({});
                if (wsRef.current) {
                    wsRef.current.close();
                    wsRef.current = null;
                }
            };

            // ==============================================
            // Регистрация и вход
            // ==============================================

            /** Регистрация нового пользователя через POST /users/registration. */
            const register = async () => {
                try {
                    const res = await fetch(`${API}/users/registration`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username, email, password }),
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setStatus({ type: "ok", text: `Пользователь создан (id: ${data.id}). Теперь войдите.` });
                    } else {
                        setStatus({ type: "err", text: data.detail || "Ошибка регистрации" });
                    }
                } catch {
                    setStatus({ type: "err", text: "Сервер недоступен" });
                }
            };

            /**
             * Вход по email/пароль: получает access + refresh токены,
             * сохраняет в localStorage, загружает данные пользователя и его чаты.
             */
            const login = async () => {
                try {
                    const res = await fetch(`${API}/auth/login`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email, password }),
                    });
                    const data = await res.json();
                    if (res.ok) {
                        localStorage.setItem("access_token", data.access_token);
                        localStorage.setItem("refresh_token", data.refresh_token);
                        setToken(data.access_token);

                        const payload = JSON.parse(atob(data.access_token.split(".")[1]));
                        const userRes = await fetch(`${API}/users/${payload.sub}`, {
                            headers: { "Authorization": `Bearer ${data.access_token}` },
                        });
                        const userData = await userRes.json();
                        setCurrentUser(userData);

                        const chatsRes = await fetch(`${API}/chats`, {
                            headers: { "Authorization": `Bearer ${data.access_token}` },
                        });
                        if (chatsRes.ok) {
                            const chatsData = await chatsRes.json();
                            setChats(chatsData);
                            const counts = {};
                            chatsData.forEach((c) => { counts[c.id] = c.unread_count || 0; });
                            setUnreadCounts(counts);
                        }
                    } else {
                        setStatus({ type: "err", text: data.detail || "Ошибка входа" });
                    }
                } catch {
                    setStatus({ type: "err", text: "Сервер недоступен" });
                }
            };

            // ==============================================
            // Загрузка чатов при изменении токена/пользователя
            // ==============================================

            useEffect(() => {
                if (!token || !currentUser) return;
                (async () => {
                    try {
                        const res = await fetch(`${API}/chats`, { headers: authHeaders() });
                        if (res.ok) {
                            const data = await res.json();
                            setChats(data);
                            const counts = {};
                            data.forEach((c) => { counts[c.id] = c.unread_count || 0; });
                            setUnreadCounts(counts);
                        }
                    } catch {}
                })();
            }, [token, currentUser]);

            // ==============================================
            // WebSocket: подключение, приём сообщений и событий read_update
            // ==============================================

            useEffect(() => {
                if (!token || !currentUser) return;
                const socket = new WebSocket(`ws://localhost:8000/ws?token=${token}`);
                socket.onopen = () => console.log("WS connected");
                socket.onmessage = (e) => {
                    const data = JSON.parse(e.data);

                    // Игнорируем подтверждения отправки
                    if (data.status === "sent") return;

                    // Обработка события read_update — кто-то прочитал сообщения
                    if (data.type === "read_update") {
                        const current = activeChatRef.current;
                        if (current && current.id === data.chat_id) {
                            // Обновляем last_read_message_id у участника в activeChat
                            setActiveChat((prev) => {
                                if (!prev || prev.id !== data.chat_id) return prev;
                                return {
                                    ...prev,
                                    participants: prev.participants.map((p) =>
                                        p.user.id === data.user_id
                                            ? { ...p, last_read_message_id: data.last_read_message_id }
                                            : p
                                    ),
                                };
                            });
                            // Пересчитываем is_read для отображённых сообщений
                            setMessages((prev) =>
                                prev.map((m) => {
                                    if (m.type !== "sent" || m.is_system) return m;
                                    if (m.id && m.id <= data.last_read_message_id) {
                                        return { ...m, is_read: true };
                                    }
                                    return m;
                                })
                            );
                        }
                        return;
                    }

                    // Обработка нового сообщения
                    const current = activeChatRef.current;
                    if (current && current.id === data.chat_id) {
                        // Сообщение для активного чата — показываем сразу
                        const type = data.is_system ? "system" : (data.sender_id === currentUser.id ? "sent" : "received");
                        setMessages((prev) => [...prev, { ...data, type, is_read: false }]);

                        // Автоматически отмечаем как прочитанное, т.к. чат открыт
                        if (data.id && wsRef.current) {
                            wsRef.current.send(JSON.stringify({
                                type: "read",
                                chat_id: data.chat_id,
                                message_id: data.id,
                            }));
                        }
                    } else {
                        // Сообщение для неактивного чата — увеличиваем счётчик непрочитанных
                        setUnreadCounts((prev) => ({
                            ...prev,
                            [data.chat_id]: (prev[data.chat_id] || 0) + 1,
                        }));
                    }

                    // Если чат ещё не в списке — загружаем список заново
                    if (!chatsRef.current.find((c) => c.id === data.chat_id)) {
                        fetch(`${API}/chats`, { headers: authHeaders() })
                            .then((r) => r.json())
                            .then((allChats) => {
                                setChats(allChats);
                                const counts = {};
                                allChats.forEach((c) => { counts[c.id] = c.unread_count || 0; });
                                setUnreadCounts((prev) => ({ ...prev, ...counts }));
                            })
                            .catch(() => {});
                    }
                };
                socket.onclose = () => console.log("WS disconnected");
                wsRef.current = socket;
                return () => socket.close();
            }, [token, currentUser]);

            // ==============================================
            // Поиск пользователей с debounce 300мс
            // ==============================================

            useEffect(() => {
                if (!searchQuery || !token) {
                    setSearchResults([]);
                    return;
                }
                const timeout = setTimeout(async () => {
                    try {
                        const res = await fetch(
                            `${API}/users/search?q=${encodeURIComponent(searchQuery)}&by=${searchBy}`,
                            { headers: authHeaders() }
                        );
                        if (res.ok) {
                            const data = await res.json();
                            setSearchResults(data.filter((u) => u.id !== currentUser?.id));
                        }
                    } catch {}
                }, 300);
                return () => clearTimeout(timeout);
            }, [searchQuery, searchBy, token]);

            // ==============================================
            // Открытие чата с пользователем (из результатов поиска)
            // ==============================================

            /**
             * Создаёт приватный чат с пользователем (или возвращает существующий)
             * и открывает его.
             */
            const openChatWithUser = async (user) => {
                setSearchQuery("");
                setSearchResults([]);

                try {
                    const res = await fetch(`${API}/chats`, {
                        method: "POST",
                        headers: authHeaders(),
                        body: JSON.stringify({ user_ids: [user.id] }),
                    });
                    if (res.ok) {
                        const chat = await res.json();
                        setChats((prev) => prev.find((c) => c.id === chat.id) ? prev : [...prev, chat]);
                        openChatById(chat);
                    }
                } catch {}
            };

            // ==============================================
            // Открытие чата (загрузка сообщений + отметка прочтения)
            // ==============================================

            /**
             * Загружает историю сообщений чата и отмечает все как прочитанные.
             * Сообщения приходят с вычисленным is_read с сервера.
             */
            const openChatById = async (chat) => {
                setActiveChat(chat);
                // Сбрасываем счётчик непрочитанных для этого чата
                setUnreadCounts((prev) => ({ ...prev, [chat.id]: 0 }));

                try {
                    const res = await fetch(`${API}/chats/${chat.id}/messages`, {
                        headers: authHeaders(),
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const mapped = data.map((m) => ({
                            ...m,
                            type: m.is_system ? "system" : (m.sender_id === currentUser.id ? "sent" : "received"),
                        }));
                        setMessages(mapped);

                        // Отмечаем как прочитанные — отправляем read-событие
                        // для последнего сообщения в чате
                        if (mapped.length > 0) {
                            const lastMsg = mapped[mapped.length - 1];
                            if (lastMsg.id && wsRef.current && wsRef.current.readyState === WebSocket.OPEN) {
                                wsRef.current.send(JSON.stringify({
                                    type: "read",
                                    chat_id: chat.id,
                                    message_id: lastMsg.id,
                                }));
                            }
                        }
                    }
                } catch {}
            };

            // ==============================================
            // Отправка сообщения через WebSocket
            // ==============================================

            /** Отправляет текстовое сообщение в активный чат. */
            const sendMessage = () => {
                if (!wsRef.current || !activeChat || !text.trim()) return;
                wsRef.current.send(JSON.stringify({ chat_id: activeChat.id, text }));
                setMessages((prev) => [
                    ...prev,
                    { text, chat_id: activeChat.id, sender_id: currentUser.id, type: "sent", is_system: false, is_read: false },
                ]);
                setText("");
            };

            // ==============================================
            // Вспомогательные функции для отображения
            // ==============================================

            /** Находит username отправителя по sender_id (для групповых чатов). */
            const getSenderName = (msg) => {
                if (!activeChat || !activeChat.participants) return null;
                const p = activeChat.participants.find((pp) => pp.user?.id === msg.sender_id);
                return p?.user?.username || null;
            };

            /** Определяет, является ли активный чат групповым (>2 участников). */
            const isGroupChat = activeChat && activeChat.participants && activeChat.participants.length > 2;

            /**
             * Вычисляет is_read для отправленного сообщения на основе
             * last_read_message_id участников.
             * — Приватный чат: собеседник прочитал?
             * — Групповой чат: хотя бы один участник (кроме отправителя) прочитал?
             */
            const computeIsRead = (msg) => {
                if (!activeChat || !activeChat.participants || !msg.id) return false;
                if (msg.is_read) return true;

                const participants = activeChat.participants;
                if (participants.length === 2) {
                    const other = participants.find((p) => p.user?.id !== currentUser?.id);
                    return other && other.last_read_message_id != null && other.last_read_message_id >= msg.id;
                }
                return participants.some(
                    (p) => p.user?.id !== msg.sender_id && p.last_read_message_id != null && p.last_read_message_id >= msg.id
                );
            };

            /**
             * Собирает уникальный список пользователей из всех чатов
             * (кроме текущего пользователя) — используется в модалке создания группы.
             */
            const knownUsers = React.useMemo(() => {
                const map = new Map();
                chats.forEach((c) => {
                    c.participants?.forEach((p) => {
                        if (p.user?.id !== currentUser?.id) {
                            map.set(p.user.id, p.user);
                        }
                    });
                });
                return Array.from(map.values());
            }, [chats, currentUser]);

            /** Переключает выбор пользователя в модалке группового чата. */
            const toggleUserSelection = (userId) => {
                setSelectedUserIds((prev) =>
                    prev.includes(userId) ? prev.filter((id) => id !== userId) : [...prev, userId]
                );
            };

            /** Создаёт групповой чат с выбранными пользователями. */
            const createGroupChat = async () => {
                if (selectedUserIds.length < 2) return;
                try {
                    const res = await fetch(`${API}/chats`, {
                        method: "POST",
                        headers: authHeaders(),
                        body: JSON.stringify({ user_ids: selectedUserIds, name: groupName || null }),
                    });
                    if (res.ok) {
                        const chat = await res.json();
                        setChats((prev) => prev.find((c) => c.id === chat.id) ? prev : [...prev, chat]);
                        openChatById(chat);
                        setShowGroupModal(false);
                        setGroupName("");
                        setSelectedUserIds([]);
                    }
                } catch {}
            };

            // ========== RENDER ==========

            // Экран загрузки при автологине
            if (loading) {
                return (
                    <div className="auth-page">
                        <div style={{ color: "#888", fontSize: 18 }}>Загрузка...</div>
                    </div>
                );
            }

            // Экран авторизации (если нет токена)
            if (!token) {
                return (
                    <div className="auth-page">
                        <div className="auth-card">
                            <h1>Messager</h1>
                            <div className="tabs">
                                <button className={tab === "login" ? "active" : ""} onClick={() => { setTab("login"); setStatus(null); }}>Вход</button>
                                <button className={tab === "register" ? "active" : ""} onClick={() => { setTab("register"); setStatus(null); }}>Регистрация</button>
                            </div>
                            <div className="auth-form">
                                {tab === "register" && (
                                    <input placeholder="Username" value={username} onChange={(e) => setUsername(e.target.value)} />
                                )}
                                <input placeholder="Email" value={email} onChange={(e) => setEmail(e.target.value)} />
                                <input
                                    placeholder="Password" type="password" value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    onKeyDown={(e) => e.key === "Enter" && (tab === "login" ? login() : register())}
                                />
                                <button onClick={tab === "login" ? login : register}>
                                    {tab === "login" ? "Войти" : "Зарегистрироваться"}
                                </button>
                            </div>
                            {status && <div className={`status ${status.type}`}>{status.text}</div>}
                        </div>
                    </div>
                );
            }

            // Основной интерфейс мессенджера
            return (
                <div className="app-layout">
                    {/* Боковая панель: заголовок, поиск, список чатов */}
                    <div className="sidebar">
                        <div className="sidebar-header">
                            <div className="sidebar-header-row">
                                <h2>{currentUser?.username}</h2>
                                <div style={{ display: "flex", gap: 4 }}>
                                    <button className="btn-small" onClick={() => setShowGroupModal(true)}>+ Группа</button>
                                    <button className="btn-small btn-secondary" onClick={logout}>Выход</button>
                                </div>
                            </div>
                            <div className="search-bar">
                                <input
                                    placeholder="Поиск..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                                <select value={searchBy} onChange={(e) => setSearchBy(e.target.value)}>
                                    <option value="username">имя</option>
                                    <option value="email">email</option>
                                </select>
                            </div>
                        </div>

                        {/* Результаты поиска пользователей */}
                        {searchResults.length > 0 && (
                            <div className="search-results">
                                {searchResults.map((u) => (
                                    <div key={u.id} className="user-item" onClick={() => openChatWithUser(u)}>
                                        {u.username}
                                        <div className="sub">{u.email}</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Список чатов с индикатором непрочитанных */}
                        <div className="chats-list">
                            {chats.map((c) => (
                                <div
                                    key={c.id}
                                    className={`chat-item ${activeChat?.id === c.id ? "active" : ""}`}
                                    onClick={() => openChatById(c)}
                                >
                                    <div className="chat-avatar">{getChatAvatar(c)}</div>
                                    <div className="chat-info">
                                        <div className="chat-name">{getChatDisplayName(c)}</div>
                                        {c.participants?.length > 2 && (
                                            <div className="chat-sub">
                                                {c.participants.length} участников
                                            </div>
                                        )}
                                    </div>
                                    {(unreadCounts[c.id] || 0) > 0 && (
                                        <div className="unread-badge">{unreadCounts[c.id]}</div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Область чата: заголовок, сообщения, форма отправки */}
                    <div className="chat-area">
                        {!activeChat ? (
                            <div className="chat-empty">Выберите чат</div>
                        ) : (
                            <>
                                <div className="chat-header">{getChatDisplayName(activeChat)}</div>
                                <div className="messages">
                                    {messages.map((m, i) => (
                                        <div key={i} className={`msg ${m.type}`}>
                                            {/* Имя отправителя в групповом чате */}
                                            {m.type === "received" && isGroupChat && (
                                                <div className="sender-name">{getSenderName(m)}</div>
                                            )}
                                            {m.text}
                                            {/* Время + галочки прочтения для отправленных сообщений */}
                                            {m.created_at && !m.is_system && (
                                                <div className="time">
                                                    {new Date(m.created_at).toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" })}
                                                    {m.type === "sent" && (
                                                        <span className={`read-status ${computeIsRead(m) ? "read" : ""}`}>
                                                            {computeIsRead(m) ? "✓✓" : "✓"}
                                                        </span>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                    <div ref={messagesEnd} />
                                </div>
                                <div className="send-form">
                                    <input
                                        placeholder="Сообщение..."
                                        value={text}
                                        onChange={(e) => setText(e.target.value)}
                                        onKeyDown={(e) => e.key === "Enter" && sendMessage()}
                                    />
                                    <button onClick={sendMessage}>→</button>
                                </div>
                            </>
                        )}
                    </div>

                    {/* Модальное окно создания группового чата */}
                    {showGroupModal && (
                        <div className="modal-overlay" onClick={() => setShowGroupModal(false)}>
                            <div className="modal-card" onClick={(e) => e.stopPropagation()}>
                                <h3>Новый групповой чат</h3>
                                <input
                                    placeholder="Название группы (необязательно)"
                                    value={groupName}
                                    onChange={(e) => setGroupName(e.target.value)}
                                />
                                <div style={{ fontSize: 13, color: "#888" }}>Выберите минимум 2 участников:</div>
                                <div className="modal-users">
                                    {knownUsers.length === 0 && (
                                        <div style={{ color: "#555", fontSize: 13, padding: 8 }}>Нет контактов. Сначала начните приватный чат.</div>
                                    )}
                                    {knownUsers.map((u) => (
                                        <label key={u.id} className={`modal-user ${selectedUserIds.includes(u.id) ? "selected" : ""}`}>
                                            <input
                                                type="checkbox"
                                                checked={selectedUserIds.includes(u.id)}
                                                onChange={() => toggleUserSelection(u.id)}
                                            />
                                            <div>
                                                <div>{u.username}</div>
                                                <div style={{ fontSize: 11, opacity: 0.5 }}>{u.email}</div>
                                            </div>
                                        </label>
                                    ))}
                                </div>
                                <div className="modal-actions">
                                    <button className="btn-secondary" onClick={() => { setShowGroupModal(false); setGroupName(""); setSelectedUserIds([]); }}>Отмена</button>
                                    <button onClick={createGroupChat} disabled={selectedUserIds.length < 2}>Создать</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
